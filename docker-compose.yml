version: '3.8'

# ================================================================
# GSIS — Docker Compose para Produção (Etapa 2)
# Configuração completa será implementada após o backend estar pronto.
# ================================================================

services:

  nginx:
    image: nginx:alpine
    container_name: gsis-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gsis-backend
    expose:
      - "3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      MYSQL_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: gsis-mysql
    expose:
      - "3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gsis_db}
      MYSQL_USER: ${MYSQL_USER:-gsis_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gsis_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - gsis_mysql_prod:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  gsis_mysql_prod:
    name: gsis_mysql_prod

